.delta-card.dn .dv{color:var(--red)}.delta-card.dn .dd{color:var(--red)}

  if(!active||!payload?.length) return null;
  return <div style={{background:"#132038",border:"1px solid #1a2d45",borderRadius:8,padding:"9px 13px",fontSize:11,fontFamily:"DM Mono,monospace"}}>
    <div style={{color:"#6f8fad",marginBottom:4}}>{label}</div>
    {payload.map((p,i)=><div key={i} style={{color:p.color}}>{p.name}: {p.value}{p.unit||""}</div>)}
  </div>;
}

// Mini chart
function MC({data,dataKey,color,unit,refVal,refLabel,domain,h=165,multi}){
  const gid="g"+dataKey;
  const mn=Math.min(...data.map(d=>d[dataKey]));
  const mx=Math.max(...data.map(d=>d[dataKey]));
  const d37=+(data[data.length-1][dataKey]-data[0][dataKey]).toFixed(1);
  const goodDown=["weight","bodyFat","fatMass","visceralFat","bmi","subcutFat","bodyAge"].includes(dataKey);
  const good=goodDown?d37<0:d37>0;
  const dc=d37===0?"#6f8fad":good?"#00c9a7":"#f05252";
  return <div className="cbox">
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
      <div className="ctitle" style={{marginBottom:0}}>{unit}</div>
      <div style={{fontFamily:"DM Mono,monospace",fontSize:10,display:"flex",gap:10}}>
        <span style={{color:"#4a6580"}}>低{mn} 高{mx}</span>
        <span style={{color:dc,fontWeight:500}}>{d37>0?"+":""}{d37} {good?"▲":"▼"}</span>
      </div>
    </div>
    {!multi ? (
    <ResponsiveContainer width="100%" height={h}>
      <AreaChart data={data}>
        <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="5%" stopColor={color} stopOpacity={.25}/>
          <stop offset="95%" stopColor={color} stopOpacity={0}/>
        </linearGradient></defs>
        <CartesianGrid strokeDasharray="3 3" stroke="#1a2d45"/>
        <XAxis dataKey="label" stroke="#4a6580" tick={{fontSize:9,fontFamily:"DM Mono"}} interval={5}/>
        <YAxis stroke="#4a6580" tick={{fontSize:9,fontFamily:"DM Mono"}} domain={domain||["auto","auto"]} width={32}/>
        <Tooltip content={<Tip/>}/>
        {refVal&&<ReferenceLine y={refVal} stroke={color} strokeDasharray="4 3" strokeOpacity={.6} label={{value:refLabel,fill:color,fontSize:9,position:"insideTopRight"}}/>}
        <Area type="monotone" dataKey={dataKey} stroke={color} fill={`url(#${gid})`} strokeWidth={2} dot={false} name={unit}/>
      </AreaChart>
    </ResponsiveContainer>
    ) : (
    <ResponsiveContainer width="100%" height={h}>
      <LineChart data={data}>
        <CartesianGrid strokeDasharray="3 3" stroke="#1a2d45"/>
        <XAxis dataKey="label" stroke="#4a6580" tick={{fontSize:9,fontFamily:"DM Mono"}} interval={5}/>
        <YAxis stroke="#4a6580" tick={{fontSize:9,fontFamily:"DM Mono"}} domain={domain||["auto","auto"]} width={32}/>
        <Tooltip content={<Tip/>}/>
        <Legend wrapperStyle={{fontSize:10,fontFamily:"DM Mono"}}/>
        {multi.map(m=><Line key={m.k} type="monotone" dataKey={m.k} stroke={m.c} strokeWidth={1.8} dot={false} name={m.n}/>)}
      </LineChart>
    </ResponsiveContainer>
    )}
  </div>;
}

function SL({children}){
  return <div className="sec-lbl">{children}</div>;
}

function App(){
  const [tab,setTab]=useState("today");
  const [eLogs,setELogs]=useState([]);
  const [dLogs,setDLogs]=useState([]);
  const [toast,setToast]=useState(null);
  const [eF,setEF]=useState({date:TODAY,exercise:"全身訓練",weight:"27.5",reps:"12",sets:"3",note:""});
  const [dF,setDF]=useState({date:TODAY,meal:"早餐",calories:"",protein:"",carbs:"",fat:"",note:""});

  useEffect(()=>{
    const e=LS.get("eLogs_h"); if(e) setELogs(e);
    const d=LS.get("dLogs_h"); if(d) setDLogs(d);
  },[]);

  const toast_=m=>{setToast(m);setTimeout(()=>setToast(null),2400);};

  const saveE=()=>{
    if(!eF.exercise) return;
    const u=[{...eF,id:Date.now(),weight:+eF.weight,reps:+eF.reps,sets:+eF.sets},...eLogs];
    LS.set("eLogs_h",u); setELogs(u);
    setEF({date:TODAY,exercise:"全身訓練",weight:"27.5",reps:"12",sets:"3",note:""});
    toast_("✓ 運動已記錄");
  };
  const saveD=()=>{
    if(!dF.calories) return;
    const u=[{...dF,id:Date.now(),calories:+dF.calories,protein:+dF.protein,carbs:+dF.carbs,fat:+dF.fat},...dLogs];
    LS.set("dLogs_h",u); setDLogs(u);
    setDF({date:TODAY,meal:"早餐",calories:"",protein:"",carbs:"",fat:"",note:""});
    toast_("✓ 飲食已記錄");
  };

  const weeks=weeklyStats();
  const td=dLogs.filter(d=>d.date===TODAY);
  const tCal=td.reduce((s,d)=>s+(d.calories||0),0);
  const tPro=td.reduce((s,d)=>s+(d.protein||0),0);
  const days=opDay(TODAY);

  return <>
    <div className="app">
      <div className="hdr">
        <h1>🫀 蕭家杰 術後健康追蹤</h1>
        <div className="sub">Left Radical Nephrectomy · Clear Cell RCC G2 pT3a · 林口長庚 · HBF-702T · {TODAY}</div>
      </div>

      <div className="tabs">
        {[["today","今日"],["trend","各項趨勢"],["weekly","週報"],["exercise","運動"],["diet","飲食"],["recovery","術後"]].map(([k,v])=>(
          <button key={k} className={`tab ${tab===k?"on":""}`} onClick={()=>setTab(k)}>{v}</button>
        ))}
      </div>

      {/* TODAY */}
      {tab==="today" && <>
        <div className="banner">
          <div className="days">{days}</div>
          <div className="info" style={{flex:1}}>
            <h3>術後第 {days} 天</h3>
            <p>Clear Cell RCC, Grade 2, pT3a, Stage III<br/>腫瘤 5.3×4.6×3.7cm · 切緣(-) · 無LVI<br/>主治：林柏宏醫師（泌尿腫瘤科）</p>
            <div className="pbar-wrap"><div className="pbar" style={{width:`${Math.min(days/365*100,100)}%`}}/></div>
          </div>
        </div>

        <div className="sec"><div className="sec-title">37天進展（4/20 → 5/27）</div>
          <div className="delta-row">
            {[
              {l:"體重",k:"weight",u:"kg",good:v=>v<0},{l:"脂肪量",k:"fatMass",u:"kg",good:v=>v<0},
              {l:"體脂率",k:"bodyFat",u:"%",good:v=>v<0},{l:"骨骼肌",k:"muscleMass",u:"kg",good:v=>v>0},
              {l:"內臟脂肪",k:"visceralFat",u:"級",good:v=>v<0},{l:"身體年齡",k:"bodyAge",u:"歲",good:v=>v<0},
            ].map(d=>{
              const v=delta(d.k); const g=d.good(v);
              return <div key={d.k} className={`delta-card ${g?"up":"dn"}`}>
                <div className="dl">{d.l}</div>
                <div className="dv">{v>0?"+":""}{v}<span style={{fontSize:13,marginLeft:3}}>{d.u}</span></div>
                <div className="dd">{first[d.k]} → {last[d.k]}</div>
              </div>;
            })}
          </div>
        </div>

        <div className="sec"><div className="sec-title">今日數據（05/27 晨量）</div>
          <div className="sg sg3">
            <div className="sc teal"><div className="sl">體重</div><div className="sv">{last.weight}</div><div className="su">kg（App）</div></div>
            <div className="sc red"><div className="sl">體脂肪</div><div className="sv">{last.bodyFat}%</div><div className="su">{last.fatMass} kg</div><span className="stag stag-bad">偏高++</span></div>
            <div className="sc blue"><div className="sl">骨骼肌</div><div className="sv">{last.musclePct}%</div><div className="su">{last.muscleMass} kg</div></div>
            <div className="sc red"><div className="sl">內臟脂肪</div><div className="sv">{last.visceralFat}</div><div className="su">等級（正常≤9）</div><span className="stag stag-bad">危險</span></div>
            <div className="sc amber"><div className="sl">BMI</div><div className="sv">{last.bmi}</div><div className="su">過重（正常＜24）</div></div>
            <div className="sc"><div className="sl">基礎代謝</div><div className="sv">{last.bmr}</div><div className="su">kcal/day</div></div>
          </div>
        </div>

        <div className="sec"><div className="sec-title">部位骨骼肌率</div>
          <div className="mbr">
            {[["雙臂",last.armMuscle,"var(--teal)"],["身軀",last.torsoMuscle,"var(--blue)"],["雙腳",last.legMuscle,"var(--lime)"]].map(([n,v,c])=>(
              <div className="mb-seg" key={n}><div className="mbl">{n}</div><div className="mbv" style={{color:c}}>{v}%</div></div>
            ))}
          </div>
        </div>

        <div className="sec"><div className="sec-title">目標缺口</div>
          <div className="sg sg3">
            <div className="sc lime"><div className="sl">目標體重</div><div className="sv" style={{color:"var(--lime)"}}>90</div><div className="su">kg · 缺 {(last.weight-90).toFixed(1)} kg</div></div>
            <div className="sc amber"><div className="sl">目標體脂</div><div className="sv" style={{color:"var(--amber)"}}>24</div><div className="su">% · 缺 {(last.bodyFat-24).toFixed(1)}%</div></div>
            <div className="sc teal"><div className="sl">目標肌肉</div><div className="sv" style={{color:"var(--teal)"}}>33</div><div className="su">kg · 差 {(33-last.muscleMass).toFixed(1)} kg</div></div>
          </div>
        </div>

        <div className="sec"><div className="sec-title">每日通勤負重</div>
          <div className="sc" style={{display:"flex",gap:12,alignItems:"center"}}>
            <span style={{fontSize:24}}>🚄</span>

            </div>
          </div>
        </div>
      </>}

      {/* TREND */}
      {tab==="trend" && <>
        <SL>① 體重 (kg)</SL>
        <MC data={chartData} dataKey="weight" color="#00c9a7" unit="體重 kg" refVal={90} refLabel="目標90" domain={[96.5,101]}/>
        <SL>② 體脂肪率 (%)</SL>
        <MC data={chartData} dataKey="bodyFat" color="#f05252" unit="體脂肪 %" refVal={24} refLabel="目標24%" domain={[29,34]}/>
        <SL>③ 脂肪量 (kg)</SL>
        <MC data={chartData} dataKey="fatMass" color="#f07b52" unit="脂肪量 kg" domain={[28.5,33.5]}/>
        <SL>④ 骨骼肌率 (%)</SL>
        <MC data={chartData} dataKey="musclePct" color="#5b9df5" unit="骨骼肌率 %" domain={[28,31]}/>
        <SL>⑤ 骨骼肌量 (kg)</SL>
        <MC data={chartData} dataKey="muscleMass" color="#4ec9c9" unit="骨骼肌量 kg" refVal={33} refLabel="目標33" domain={[27.5,30]}/>
        <SL>⑥ 內臟脂肪等級</SL>
        <MC data={chartData} dataKey="visceralFat" color="#f05252" unit="內臟脂肪 等級" domain={[15.5,18.5]}/>
        <SL>⑦ BMI</SL>
        <MC data={chartData} dataKey="bmi" color="#f0a500" unit="BMI" refVal={24} refLabel="正常<24" domain={[29.5,31]}/>
        <SL>⑧ 基礎代謝 (kcal)</SL>
        <MC data={chartData} dataKey="bmr" color="#a78bfa" unit="基礎代謝 kcal" domain={[1985,2040]}/>
        <SL>⑨ 身體年齡 (歲)</SL>
        <MC data={chartData} dataKey="bodyAge" color="#f0a500" unit="身體年齡 歲" domain={[57,62]}/>
        <SL>⑩ 皮下脂肪率 (%)</SL>
        <MC data={chartData} dataKey="subcutFat" color="#f05252" unit="皮下脂肪 %" domain={[20.5,24]}/>
        <SL>⑪ 脂肪量 vs 肌肉量</SL>
        <MC data={chartData} dataKey="fatMass" color="#f05252" unit="kg對比" domain={[27,34]} h={185}
          multi={[{k:"fatMass",c:"#f05252",n:"脂肪量kg"},{k:"muscleMass",c:"#00c9a7",n:"肌肉量kg"}]}/>
        <SL>⑫ 部位骨骼肌率</SL>
        <MC data={chartData} dataKey="armMuscle" color="#00c9a7" unit="部位%" h={185}

      </>}

      {/* WEEKLY */}
      {tab==="weekly" && <>
        <div className="cbox">
          <div className="ctitle">週平均</div>
          <table className="wtable">
            <thead><tr><th>週次</th><th>體重</th><th>體脂%</th><th>肌肉kg</th><th>內臟脂</th></tr></thead>
            <tbody>{weeks.map((w,i)=>(

        </div>
        <div className="sec"><div className="sec-title">37天總結</div>
          <div className="sg">
            <div className="sc teal"><div className="sl">已減脂肪</div><div className="sv teal" style={{color:"var(--teal)"}}>{Math.abs(delta("fatMass"))}</div><div className="su">kg ({first.fatMass}→{last.fatMass})</div></div>
            <div className="sc blue"><div className="sl">肌肉增加</div><div className="sv" style={{color:"var(--blue)"}}>{delta("muscleMass")>0?"+":""}{delta("muscleMass")}</div><div className="su">kg ({first.muscleMass}→{last.muscleMass})</div></div>
            <div className="sc lime"><div className="sl">體重變化</div><div className="sv" style={{color:"var(--lime)"}}>{delta("weight")}</div><div className="su">kg ({first.weight}→{last.weight})</div></div>
            <div className="sc amber"><div className="sl">身體年齡</div><div className="sv" style={{color:"var(--amber)"}}>{delta("bodyAge")}</div><div className="su">歲 ({first.bodyAge}→{last.bodyAge})</div></div>
          </div>
        </div>
      </>}

      {/* EXERCISE */}
      {tab==="exercise" && <>
        <div className="sc teal" style={{marginBottom:14}}>
          <div className="sl">目前基準</div><div className="sv teal" style={{color:"var(--teal)"}}>27.5 kg</div>
          <div className="su">12下 × 3組 · 全身訓練</div>
        </div>
        <div className="form">
          <h3>🏋️ 新增運動記錄</h3>

              <select value={eF.exercise} onChange={e=>setEF({...eF,exercise:e.target.value})}>

          <div className="row3">
            <div className="field"><label>重量kg</label><input type="number" step="2.5" value={eF.weight} onChange={e=>setEF({...eF,weight:e.target.value})}/></div>
            <div className="field"><label>次數</label><input type="number" value={eF.reps} onChange={e=>setEF({...eF,reps:e.target.value})}/></div>
            <div className="field"><label>組數</label><input type="number" value={eF.sets} onChange={e=>setEF({...eF,sets:e.target.value})}/></div>
          </div>
          <div className="field"><label>備注</label><input type="text" placeholder="感覺、進步…" value={eF.note} onChange={e=>setEF({...eF,note:e.target.value})}/></div>
          <button className="btn" onClick={saveE}>儲存</button>
        </div>
        {eLogs.length===0 && <div className="empty">尚無記錄</div>}

          <div className="li" key={e.id}>
            <div className="ld">📅 {e.date}</div>
            <div className="lm">{e.exercise} · {e.weight}kg × {e.reps}下 × {e.sets}組</div>
            <div className="ls">總量: {(e.weight*e.reps*e.sets).toLocaleString()}kg{e.note?` · ${e.note}`:""}</div>

      {/* DIET */}
      {tab==="diet" && <>
        <div className="sg" style={{marginBottom:14}}>
          <div className="sc"><div className="sl">今日攝入</div><div className="sv">{tCal}</div><div className="su">kcal · BMR {last.bmr}</div></div>
          <div className={`sc ${tCal>0&&last.bmr-tCal>0?"teal":"red"}`}>
            <div className="sl">{last.bmr-tCal>0?"熱量缺口":"超出BMR"}</div>
            <div className="sv" style={{color:last.bmr-tCal>0?"var(--teal)":"var(--red)"}}>{Math.abs(last.bmr-tCal)}</div>
            <div className="su">kcal · 蛋白質 {tPro}g</div>
          </div>
        </div>
        <div className="form">
          <h3>🍱 新增飲食記錄</h3>
          <div className="row2">
            <div className="field"><label>日期</label><input type="date" value={dF.date} onChange={e=>setDF({...dF,date:e.target.value})}/></div>
            <div className="field"><label>餐次</label>
              <select value={dF.meal} onChange={e=>setDF({...dF,meal:e.target.value})}>
                {["早餐","午餐","晚餐","點心","補充"].map(v=><option key={v}>{v}</option>)}
              </select>
            </div>
          </div>
          <div className="row3">
            <div className="field"><label>熱量kcal</label><input type="number" placeholder="500" value={dF.calories} onChange={e=>setDF({...dF,calories:e.target.value})}/></div>
            <div className="field"><label>蛋白質g</label><input type="number" placeholder="30" value={dF.protein} onChange={e=>setDF({...dF,protein:e.target.value})}/></div>

          </div>
          <div className="field"><label>備注</label><input type="text" placeholder="雞胸飯、蛋白棒…" value={dF.note} onChange={e=>setDF({...dF,note:e.target.value})}/></div>
          <button className="btn" onClick={saveD}>儲存</button>
        </div>
        {dLogs.length===0 && <div className="empty">尚無記錄</div>}
        {dLogs.slice(0,20).map(d=>(
          <div className="li" key={d.id}>
            <div className="ld">📅 {d.date} · {d.meal}</div>
            <div className="lm">{d.calories}kcal · 蛋白質{d.protein}g · 碳水{d.carbs}g</div>
            {d.note&&<div className="ls">{d.note}</div>}
          </div>

      </>}

      {/* RECOVERY */}
      {tab==="recovery" && <>
        <div className="banner" style={{marginBottom:18}}>
          <div className="days">{days}</div>
          <div className="info" style={{flex:1}}>
            <h3>左腎根治術後追蹤</h3>
            <p>Clear Cell RCC · Grade 2 · pT3a · Stage III<br/>腫瘤 5.3×4.6×3.7cm · 切緣(-) · 無LVI</p>
          </div>
        </div>
        {[
          {date:"2026-03-30",title:"手術當日",desc:"左腎根治性腎切除術 · 林口長庚 · 林柏宏醫師",c:"var(--red)"},
          {date:"2026-04-20",title:"術後第21天 · 開始記錄",desc:"體重 99.7kg · 體脂 31.7% · 內臟脂肪 17.5 · 身體年齡 61歲",c:"var(--amber)"},
          {date:"2026-05-01",title:"術後第32天 · 健身開始",desc:"27.5kg × 12下 × 3組",c:"var(--blue)"},

          {date:"2026-05-27",title:`術後第${days}天 · 今日`,desc:`體重 ${last.weight}kg · 體脂 ${last.bodyFat}% · 肌肉 ${last.muscleMass}kg`,c:"var(--teal)"},
        ].map((ev,i,arr)=>(
          <div className="tl-row" key={i}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",width:14,paddingTop:2}}>
              <div className="tl-dot" style={{background:ev.c}}/>
              {i<arr.length-1&&<div style={{flex:1,width:2,background:"var(--bd)",marginTop:4}}/>}
            </div>
            <div className="sc" style={{flex:1,marginBottom:0}}>
              <div style={{fontFamily:"DM Mono,monospace",fontSize:10,color:ev.c,marginBottom:3}}>{ev.date}</div>
              <div style={{fontFamily:"var(--head)",fontWeight:700,fontSize:13}}>{ev.title}</div>
              <div style={{fontSize:12,color:"var(--label)",marginTop:3}}>{ev.desc}</div>
            </div>
          </div>
        ))}
        <div className="sc amber" style={{marginTop:14}}>
          <div className="sl">下次回診</div>
          <div className="sv" style={{color:"var(--amber)",fontSize:18}}>請確認回診日期</div>
          <div className="su">林柏宏醫師 · 泌尿腫瘤科</div>
        </div>
      </>}
    </div>
    {toast&&<div className="toast">{toast}</div>}
  </>;
}
