<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>🔒 健康追蹤（需密碼）</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{background:#07111f;color:#dce8f5;font-family:'Noto Sans TC',system-ui,sans-serif;min-height:100%}
:root{--teal:#00c9a7;--red:#f05252;--amber:#f0a500;--blue:#5b9df5;--lime:#7ec84a;--s1:#0d1a2e;--s2:#132038;--bd:#1a2d45;--muted:#4a6580;--label:#6f8fad;--mono:'DM Mono',monospace}
.app{max-width:900px;margin:0 auto;padding:16px 12px 60px}
h1{font-size:20px;font-weight:900;color:var(--teal);letter-spacing:-.5px;margin-bottom:4px}
.sub{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:20px}
.tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:7px;border:1px solid var(--bd);background:var(--s1);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap;font-weight:700;transition:.15s}
.tab.on{background:rgba(0,201,167,.12);border-color:var(--teal);color:var(--teal)}
.page{display:none}.page.on{display:block}
.banner{background:linear-gradient(135deg,var(--s2),var(--s1));border:1px solid var(--teal);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;gap:14px}
.days{font-family:var(--mono);font-size:48px;font-weight:500;color:var(--teal);line-height:1;min-width:68px}
.binfo h3{font-size:14px;font-weight:700;margin-bottom:4px}
.binfo p{font-size:11px;color:var(--label);line-height:1.6}
.pbar{height:4px;background:var(--bd);border-radius:2px;margin-top:8px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--blue));border-radius:2px}
.drow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
@media(max-width:420px){.drow{grid-template-columns:repeat(2,1fr)}}
.dc{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:11px 12px}
.dc.up{border-color:var(--teal)}.dc.dn{border-color:var(--red)}
.dc-l{font-size:10px;color:var(--label);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.dc-v{font-size:20px;font-family:var(--mono);font-weight:500;line-height:1}
.dc.up .dc-v{color:var(--teal)}.dc.dn .dc-v{color:var(--red)}
.dc-d{font-size:10px;margin-top:3px}
.dc.up .dc-d{color:var(--teal)}.dc.dn .dc-d{color:var(--red)}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.sg3{grid-template-columns:repeat(3,1fr)}
@media(max-width:420px){.sg3{grid-template-columns:repeat(2,1fr)}}
.sc{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 13px}
.sc.teal{border-color:var(--teal);background:rgba(0,201,167,.1)}.sc.red{border-color:var(--red);background:rgba(240,82,82,.08)}.sc.amber{border-color:var(--amber);background:rgba(240,165,0,.1)}.sc.blue{border-color:var(--blue);background:rgba(91,157,245,.08)}.sc.lime{border-color:var(--lime);background:rgba(126,200,74,.08)}
.sl{font-size:10px;color:var(--label);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sv{font-size:22px;font-family:var(--mono);font-weight:500;line-height:1}
.sc.teal .sv{color:var(--teal)}.sc.red .sv{color:var(--red)}.sc.amber .sv{color:var(--amber)}.sc.blue .sv{color:var(--blue)}.sc.lime .sv{color:var(--lime)}
.su{font-size:11px;color:var(--muted);margin-top:2px}
.stag{display:inline-block;font-size:9px;font-family:var(--mono);padding:1px 5px;border-radius:3px;margin-top:4px;background:rgba(240,82,82,.18);color:var(--red)}
.stag.w{background:rgba(240,165,0,.18);color:var(--amber)}
.sec-t{font-size:11px;font-weight:700;color:var(--label);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;margin-top:4px;display:flex;align-items:center;gap:8px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--bd)}
.sec{margin-bottom:18px}
/* SVG charts */
.chart-box{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:13px;margin-bottom:10px}
.chart-title{font-size:10px;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;justify-content:space-between}
.chart-title .delta{font-weight:500}
.chart-title .delta.good{color:var(--teal)}.chart-title .delta.bad{color:var(--red)}
svg.chart{width:100%;overflow:visible}
/* forms */
.form{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:14px}
.form h3{font-size:13px;font-weight:700;color:var(--teal);margin-bottom:12px}
.field{margin-bottom:10px}
.field label{display:block;font-size:10px;color:var(--label);font-family:var(--mono);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select{width:100%;background:#07111f;border:1px solid var(--bd);border-radius:6px;color:#dce8f5;font-family:var(--mono);font-size:13px;padding:7px 10px;outline:none}
.field input:focus,.field select:focus{border-color:var(--teal)}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{width:100%;background:var(--teal);color:#001a14;border:none;border-radius:7px;padding:10px;font-size:13px;font-weight:700;cursor:pointer}
.li{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.li .ld{font-size:10px;color:var(--muted);font-family:var(--mono)}
.li .lm{font-size:13px;margin-top:2px}
.li .ls{font-size:11px;color:var(--label);margin-top:2px}
.tl-row{display:flex;gap:10px;margin-bottom:12px}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.wtable{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px}
.wtable th{color:var(--label);font-size:10px;text-align:left;padding:4px 7px;border-bottom:1px solid var(--bd);text-transform:uppercase}
.wtable td{padding:6px 7px;border-bottom:1px solid rgba(26,45,69,.4);color:#dce8f5}
.wtable .lat td{color:var(--teal)}
.empty{text-align:center;padding:28px;color:var(--muted);font-size:12px;font-family:var(--mono)}
select option{background:#0d1a2e}
.mbr{display:flex;gap:7px;margin-bottom:8px}
.mb-s{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:9px 10px;text-align:center}
.mb-s .mbl{font-size:9px;color:var(--muted);font-family:var(--mono)}
.mb-s .mbv{font-size:17px;font-family:var(--mono);font-weight:500;margin-top:1px}
.toast{position:fixed;bottom:20px;right:14px;background:var(--teal);color:#001a14;padding:8px 14px;border-radius:8px;font-weight:700;font-size:12px;z-index:999;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
<style>
.lock-screen{position:fixed;inset:0;background:#07111f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px}
.lock-box{background:#0d1a2e;border:1px solid #1a2d45;border-radius:16px;padding:32px 28px;max-width:340px;width:100%;text-align:center}
.lock-icon{font-size:42px;margin-bottom:14px}
.lock-title{font-family:'Epilogue',sans-serif;font-size:18px;font-weight:900;color:#00c9a7;margin-bottom:6px}
.lock-sub{font-size:12px;color:#6f8fad;font-family:'DM Mono',monospace;margin-bottom:22px}
.lock-input{width:100%;background:#07111f;border:1px solid #1a2d45;border-radius:9px;color:#dce8f5;font-family:'DM Mono',monospace;font-size:16px;padding:12px 14px;outline:none;text-align:center;letter-spacing:2px;margin-bottom:12px}
.lock-input:focus{border-color:#00c9a7}
.lock-btn{width:100%;background:#00c9a7;color:#001a14;border:none;border-radius:9px;padding:12px;font-family:'Epilogue',sans-serif;font-size:15px;font-weight:700;cursor:pointer}
.lock-btn:active{opacity:.8}
.lock-err{color:#f05252;font-size:12px;font-family:'DM Mono',monospace;margin-top:12px;min-height:16px}
.lock-hint{color:#4a6580;font-size:10px;font-family:'DM Mono',monospace;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">蕭家杰 健康追蹤</div>
    <div class="lock-sub">私人醫療數據 · 請輸入密碼</div>
    <input type="password" class="lock-input" id="pwInput" placeholder="••••••••••" autocomplete="current-password"/>
    <button class="lock-btn" id="unlockBtn">解鎖</button>
    <div class="lock-err" id="errMsg"></div>
    <div class="lock-hint">🔐 AES-256 加密保護 v5.1<br>數據已加密，無密碼無法讀取</div>
  </div>
</div>
<div id="content" style="display:none"></div>

function b2b(b64){const bin=atob(b64);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
async function dec(pw){
  const e=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',e.encode(pw),'PBKDF2',false,['deriveKey']);
  const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2b(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const p=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(ENC.iv)},k,b2b(ENC.ct));
  return new TextDecoder().decode(p);
}
async function unlock(){
  const pw=document.getElementById('pwInput').value;
  const err=document.getElementById('errMsg');
  if(!pw){err.textContent='請輸入密碼';return;}
  err.textContent='解密中...';
  try{
    const html=await dec(pw);
    const c=document.getElementById('content');
    c.innerHTML=html;c.style.display='block';
    document.getElementById('lockScreen').style.display='none';
    c.querySelectorAll('script').forEach(old=>{const s=document.createElement('script');if(old.src)s.src=old.src;else s.textContent=old.textContent;document.body.appendChild(s);});
    sessionStorage.setItem('u','1');sessionStorage.setItem('p',pw);
  }catch(e){err.textContent='❌ 密碼錯誤，請重試';document.getElementById('pwInput').value='';}
}
document.getElementById('unlockBtn').addEventListener('click',unlock);
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
window.addEventListener('load',()=>{
  if(sessionStorage.getItem('u')==='1'&&sessionStorage.getItem('p')){document.getElementById('pwInput').value=sessionStorage.getItem('p');unlock();}
  else document.getElementById('pwInput').focus();
});
</script>
